name: Manual Deploy
run-name: Manual deploy to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub environment name to deploy'
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.validate.outputs.environment }}
    steps:
      - name: Validate environment exists
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_NAME: ${{ inputs.environment }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"

          STATUS=$(curl -s -o /tmp/env.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO_NAME/environments/$ENV_NAME")

          if [ "$STATUS" != "200" ]; then
            echo "Environment '$ENV_NAME' does not exist."
            exit 1
          fi

          echo "environment=$ENV_NAME" >> "$GITHUB_OUTPUT"

  deploy:
    needs: validate
    uses: ./.github/workflows/_deploy-client.yml
    with:
      environment: ${{ needs.validate.outputs.environment }}
    secrets: inherit