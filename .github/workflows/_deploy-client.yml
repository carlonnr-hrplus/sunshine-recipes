# ──────────────────────────────────────────────────────────────────
# Reusable deploy workflow — called by deploy-all.yml and deploy-manual.yml
# This avoids duplicating the deploy steps in two places.
# ──────────────────────────────────────────────────────────────────
name: _deploy-client (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'The GitHub environment name (e.g. client-acme)'

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # ── Clone the repo ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Install Supabase CLI ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Link to client's Supabase project ──
      - name: Link Supabase project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ── Run database migrations ──
      - name: Push DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ── Check for Supabase functions and deploy if present ──
      - name: Check for Supabase functions
        id: check_funcs
        shell: bash
        run: |
          if [ -d supabase/functions ] && find supabase/functions -type f -not -name 'README*' -print -quit >/dev/null 2>&1; then
            echo "has_functions=true" >> $GITHUB_OUTPUT
          else
            echo "has_functions=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Edge Functions
        if: steps.check_funcs.outputs.has_functions == 'true'
        run: |
          supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Push runtime secrets into the Supabase project ──
      #    These are read by Edge Functions via Deno.env.get()
      #    Only non-empty values are pushed.
      - name: Push Edge Function secrets
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          secrets_file="$RUNNER_TEMP/secrets.env"
          trap 'rm -f "$secrets_file"' EXIT

          : > "$secrets_file"

          [ -n "$LOVABLE_API_KEY" ] && printf 'LOVABLE_API_KEY=%s\n' "$LOVABLE_API_KEY" >> "$secrets_file"
          [ -n "$RESEND_API_KEY" ] && printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> "$secrets_file"
          [ -n "$PAYMENT_WEBHOOK_SECRET" ] && printf 'PAYMENT_WEBHOOK_SECRET=%s\n' "$PAYMENT_WEBHOOK_SECRET" >> "$secrets_file"
          [ -n "$CLOUDFLARE_API_TOKEN" ] && printf 'CLOUDFLARE_API_TOKEN=%s\n' "$CLOUDFLARE_API_TOKEN" >> "$secrets_file"
          [ -n "$CLOUDFLARE_ZONE_ID" ] && printf 'CLOUDFLARE_ZONE_ID=%s\n' "$CLOUDFLARE_ZONE_ID" >> "$secrets_file"

          if [ -s "$secrets_file" ]; then
            supabase secrets set --env-file "$secrets_file"
          else
            echo "No edge function secrets to push."
          fi

      # ── Install Node & build the frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only VITE_* variables are passed here.
      # Vite ignores everything else — but we keep the env block
      # minimal to make the boundary crystal clear.
      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_REF }}

      # ── Deploy to Azure Static Web Apps ──
      - name: Deploy to Azure SWA
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /        # where package.json is (repo root)
          output_location: dist  # vite build output directory
          skip_app_build: true   # we already built above
