# ──────────────────────────────────────────────────────────────────
# Auto-Deploy All Clients on merge to main
# ──────────────────────────────────────────────────────────────────
# Each client is a separate job calling the shared deploy workflow.
# If one client fails, the others continue independently.
# ──────────────────────────────────────────────────────────────────
name: Deploy All Clients

on:
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # No clients yet. The onboard-client.sh script will add jobs
  # here automatically. Each client gets a block like:
  #
  #   deploy-<name>:
  #     uses: ./.github/workflows/_deploy-client.yml
  #     with:
  #       environment: client-<name>
  #     secrets: inherit
  # ────────────────────────────────────────────────────────────

  deploy-sunshine-recipes-a:
    uses: ./.github/workflows/_deploy-client.yml
    with:
      environment: sunshine-recipes-a
    secrets: inherit
